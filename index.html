<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Online Fax Scanner — A4 Crop Only</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Online Fax Scanner — A4 Crop Only</h1>
  </header>

  <main>
    <section class="cam-section">
      <div class="video-wrap">
        <video id="video" autoplay playsinline></video>
        <canvas id="origCanvas"></canvas>
        <div id="handles"></div>
      </div>

      <div class="controls">
        <button id="startBtn" type="button">카메라 시작</button>
        <button id="captureBtn" type="button">촬영</button>
        <input id="fileInput" type="file" accept="image/*" />
        <button id="detectBtn" type="button">문서 자동 감지</button>
        <button id="applyBtn" type="button">변환 적용(수동)</button>
        <button id="downloadBtn" type="button">다운로드</button>
      </div>
    </section>

    <section class="result-section">
      <h2>결과</h2>
      <canvas id="resultCanvas"></canvas>
    </section>

    <section class="notes">
      <p><strong>동작:</strong> 업로드/촬영 → 자동 감지(또는 수동 보정) → A4 비율로 perspective warp → <em>색상/명암/필터 일체 변경하지 않음</em> → 출력 → 다운로드</p>
    </section>
  </main>

  <!-- OpenCV.js (async). app.js waits for runtime to be ready. -->
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
  <script src="app.js"></script>
</body>
</html>
